<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="utf-8">
        <title></title>
        <link rel="stylesheet" href="stats.css">
    </head>
    <body>
        <div class="wrapper">
            <div class="frame">
                <div class="row_wrapper header">
                    <a href="../../index.html" rel="noreferrer" class="x_button">X</a>
                    <div id="title"></div>
                    <div class="x_button">r</div>
                </div>
                <div class="wrapper_canvas">
                    <canvas></canvas>
                </div>
                <div class="navigator_wrapper">
                    <div class="navigator_item"><-</div>
                    <select name="Timeframe" class="navigator_item" id="timeframe_selector">
                        <option value="1">24 days</option>
                        <option value="2">24 weeks</option>
                        <option value="3">24 month</option>
                        <option value="4">24 legs</option>
                    </select>
                    <div class="navigator_item">-></div>
                </div>
                <div class="row_wrapper">
                    <div class="stats_wrapper">
                        <div id="statsvalue_average">Average:</div>
                        <div id="statsvalue_180">180s:</div>
                        <div id="statsvalue_darts">Darts:</div>
                        <div id="statsvalue_highfinishes">Highfinishes:</div>
                    </div>
                    <div class="right_wrapper">
                        <div class="legend_wrapper">
                            <div class="checkbox_legend_wrapper">
                                <div class="legend_box"><div class="legend_average"></div></div>
                                <div class="legend_box"><div class="legend_darts"></div></div>
                                <div class="legend_box"><div class="legend_checkout"></div></div>
                            </div>
                            <div class="checkbox_text_wrapper">
                                <div class="checkbox_text">501 Average</div>
                                <div class="checkbox_text">Darts Thrown</div>
                                <div class="checkbox_text">Checkout %</div>
                            </div>
                            <div class="checkbox_box_wrapper">
                                <div class="checkbox_box">x</div>
                                <div class="checkbox_box">x</div>
                                <div class="checkbox_box">x</div>
                            </div>
                        </div>
                        <div class="recent_wrapper">
                            <div id="match_title">Recent Matches</div>

                            <div class="match_box">
                                <div class="match_text">
                                    <div>3</div>
                                    <div>x vs x</div>
                                    <div>1</div>
                                </div>
                                <div class="match_barbox">
                                    <div class="match_bar"></div>
                                </div>
                            </div>

                            <div class="match_box">
                                <div class="match_text">
                                    <div>3</div>
                                    <div>x vs x</div>
                                    <div>1</div>
                                </div>
                                <div class="match_barbox">
                                    <div class="match_bar"></div>
                                </div>
                            </div>

                            <div class="match_box">
                                <div class="match_text">
                                    <div>3</div>
                                    <div>x vs x</div>
                                    <div>1</div>
                                </div>
                                <div class="match_barbox">
                                    <div class="match_bar"></div>
                                </div>
                            </div>

                            <div class="match_box">
                                <div class="match_text">
                                    <div>3</div>
                                    <div>x vs x</div>
                                    <div>1</div>
                                </div>
                                <div class="match_barbox">
                                    <div class="match_bar"></div>
                                </div>
                            </div>


                        </div>
                    </div>
                </div>
            </div>
        </div>

        <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>
        <script src="stats.js"></script>
    </body>
</html>
